name: CI

# Gate every PR and every push to main on both halves of the stack building
# cleanly. Frontend: type-check, vitest, production build. Backend: pytest
# against the FastAPI app (DB/Redis are mocked inside the tests, so no
# Postgres/Redis service container is needed).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend · type-check · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Unit & component tests
        run: npm run test

      - name: Production build
        run: npm run build

  backend:
    name: Backend · pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    # Tests must run WITHOUT real provider keys / .env (which is gitignored and
    # absent in CI). App modules are import-safe on a read-only/absent /app path
    # (main.py + uploads.py fall back to a temp dir), and provider-router tests
    # stub config-disable so they don't depend on PIAPI_KEY/POLLO_API_KEY.
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  migrations:
    name: Backend · alembic upgrade head
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    # Unlike the pytest job (DB mocked), this job stands up a real Postgres and
    # applies the full migration chain from an empty database, so a broken or
    # non-linear migration fails CI instead of only surfacing on deploy.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vidgo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vidgo_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONUNBUFFERED: '1'
      # alembic's console script doesn't add the working dir to sys.path, so
      # `from app...` in env.py needs PYTHONPATH — same as the backend Dockerfile
      # (ENV PYTHONPATH=/app). pytest gets this for free via its rootdir insertion.
      PYTHONPATH: ${{ github.workspace }}/backend
      # alembic/env.py reads settings.DATABASE_URL (async asyncpg driver). Point
      # it at the ephemeral Postgres service container above.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vidgo_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply all migrations (alembic upgrade head)
        run: alembic upgrade head

      - name: Assert a single head and report current revision
        run: |
          alembic heads
          alembic current
