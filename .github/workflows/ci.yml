name: CI

# Gate every PR and every push to main on both halves of the stack building
# cleanly. Frontend: type-check, vitest, production build. Backend: pytest
# against the FastAPI app (DB/Redis are mocked inside the tests, so no
# Postgres/Redis service container is needed).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend · type-check · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Unit & component tests
        run: npm run test

      - name: Production build
        run: npm run build

  backend:
    name: Backend · pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    # Tests must run WITHOUT real provider keys / .env (which is gitignored and
    # absent in CI). App modules are import-safe on a read-only/absent /app path
    # (main.py + uploads.py fall back to a temp dir), and provider-router tests
    # stub config-disable so they don't depend on PIAPI_KEY/POLLO_API_KEY.
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest
