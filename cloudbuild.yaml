# Cloud Build CI/CD Pipeline for VidGo Gen AI
# Region: asia-east1 (Taiwan)
#
# Trigger: Push to main branch
# Builds backend + frontend images, deploys to Cloud Run
#
# Required substitutions (set in Cloud Build trigger):
#   _PROJECT_ID, _REGION, _BACKEND_SERVICE, _FRONTEND_SERVICE,
#   _WORKER_SERVICE, _ARTIFACT_REPO

substitutions:
  _REGION: asia-east1
  _ARTIFACT_REPO: vidgo-images
  _BACKEND_SERVICE: vidgo-backend
  _FRONTEND_SERVICE: vidgo-frontend
  _WORKER_SERVICE: vidgo-worker
  _CLOUD_SQL_INSTANCE: ''  # Set in trigger: PROJECT_ID:asia-east1:vidgo-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ──────────────────────────────────────────────────────────────────────
  # Step 1: Build Backend Image (with layer caching)
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:latest'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # ──────────────────────────────────────────────────────────────────────
  # Step 3: Push Backend Image
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}'

  # ──────────────────────────────────────────────────────────────────────
  # Step 5: Deploy Backend to Cloud Run
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--update-env-vars'
      - 'SKIP_PREGENERATION=true,PIAPI_MCP_ENABLED=true'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'
      - '--network'
      - 'vidgo-vpc'
      - '--subnet'
      - 'vidgo-subnet'
      # all-traffic (NOT private-ranges-only): outbound payment/invoice calls to
      # Giveme + ECPay must exit via the static NAT IP that's whitelisted on
      # their side. private-ranges-only would route them through Google's dynamic
      # egress and the whitelist would reject them. Direct VPC egress (this block,
      # no VPC connector) still drops the ~$10-15/mo connector cost.
      - '--vpc-egress'
      - 'all-traffic'
      - '--allow-unauthenticated'

  # NOTE: The frontend is served by Firebase Hosting (global CDN), not Cloud Run.
  # Build & deploy it with: cd frontend-vue && npm run build && firebase deploy --only hosting
  # (The old build-frontend / push-frontend / deploy-frontend Cloud Run steps were
  # removed — they double-deployed the SPA and cost build minutes + an idle service.)

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}'

timeout: '1200s'
