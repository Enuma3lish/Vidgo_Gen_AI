# Cloud Build CI/CD Pipeline for VidGo Gen AI
# Region: asia-east1 (Taiwan)
#
# Trigger: Push to main branch
# Builds backend + frontend images, deploys to Cloud Run
#
# Required substitutions (set in Cloud Build trigger):
#   _PROJECT_ID, _REGION, _BACKEND_SERVICE, _FRONTEND_SERVICE,
#   _WORKER_SERVICE, _ARTIFACT_REPO

substitutions:
  _REGION: asia-east1
  _ARTIFACT_REPO: vidgo-images
  _BACKEND_SERVICE: vidgo-backend
  _FRONTEND_SERVICE: vidgo-frontend
  _WORKER_SERVICE: vidgo-worker
  _CLOUD_SQL_INSTANCE: ''  # Set in trigger: PROJECT_ID:asia-east1:vidgo-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ──────────────────────────────────────────────────────────────────────
  # Step 1: Build Backend Image (with layer caching)
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:latest'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # ──────────────────────────────────────────────────────────────────────
  # Step 2: Build Frontend Image (in parallel with backend)
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_FRONTEND_SERVICE}:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_FRONTEND_SERVICE}:latest'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_FRONTEND_SERVICE}:latest'
      - '-f'
      - 'frontend-vue/Dockerfile.prod'
      - 'frontend-vue/'

  # ──────────────────────────────────────────────────────────────────────
  # Step 3: Push Backend Image
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}'

  # ──────────────────────────────────────────────────────────────────────
  # Step 4: Push Frontend Image
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_FRONTEND_SERVICE}'

  # ──────────────────────────────────────────────────────────────────────
  # Step 5: Deploy Backend to Cloud Run
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--update-env-vars'
      - 'SKIP_PREGENERATION=true'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'
      - '--allow-unauthenticated'

  # ──────────────────────────────────────────────────────────────────────
  # Step 6: Deploy Worker to Cloud Run
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-worker'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_WORKER_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--no-cpu-throttling'
      - '--command'
      - '/bin/bash'
      - '--args'
      - '-c,python -m http.server 8000 & exec arq app.worker.WorkerSettings'
      - '--update-env-vars'
      - 'SKIP_PREGENERATION=true'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_INSTANCE}'
      - '--no-allow-unauthenticated'

  # ──────────────────────────────────────────────────────────────────────
  # Step 7: Deploy Frontend to Cloud Run
  # ──────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_FRONTEND_SERVICE}:${BUILD_ID}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '4'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--allow-unauthenticated'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_BACKEND_SERVICE}:${BUILD_ID}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_FRONTEND_SERVICE}:${BUILD_ID}'

timeout: '1200s'
