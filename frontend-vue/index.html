<!DOCTYPE html>
<!-- Default lang matches the zh-TW title/description below (M-3 SEO audit
     2026-06-12); applySeo() swaps it at runtime when the UI locale changes. -->
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VidGo AI — AI product photography, background removal, short video, interior design and AI digital human in one platform." />
    <meta name="robots" content="index, follow" />
    <title>VidGo AI｜AI 商品攝影、去背、短影音與室內設計工具</title>
    <!-- Open Graph / social preview. router.afterEach overrides these per page. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VidGo AI" />
    <meta property="og:title" content="VidGo AI｜AI 商品攝影、去背、短影音與室內設計工具" />
    <meta property="og:description" content="VidGo AI 集合商品攝影、智能去背、AI 試穿、室內設計渲染、短影音與數位人,一站完成電商與品牌內容製作。" />
    <meta property="og:image" content="https://storage.googleapis.com/vidgo-media-vidgo-ai/static/landing/og-cover.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VidGo AI" />
    <meta name="twitter:description" content="AI product photography, background removal, short video and interior design tools." />
    <meta name="twitter:image" content="https://storage.googleapis.com/vidgo-media-vidgo-ai/static/landing/og-cover.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <!-- IE / pre-ES-module browsers skip type=module and run this instead of
         showing a blank page. ES5 only — IE11 must be able to parse it. -->
    <script nomodule>
      (function () {
        var el = document.createElement('div');
        el.setAttribute('style', 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a1a2e;color:#fff;padding:16px 20px;font-family:sans-serif;font-size:14px;line-height:1.6;text-align:center;');
        el.innerHTML = '您的瀏覽器版本過舊，無法執行 VidGo。請改用最新版 Chrome、Edge、Safari 或 Firefox。<br>Your browser is too old to run VidGo. Please use the latest Chrome, Edge, Safari, or Firefox.';
        document.body.appendChild(el);
      })();
    </script>
  </body>
</html>
