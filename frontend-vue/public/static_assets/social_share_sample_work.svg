<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">VidGo local social share test image</title>
  <desc id="desc">A local product scene sample used to test sharing a VidGo work link.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="0.52" stop-color="#10263a"/>
      <stop offset="1" stop-color="#061016"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#122e45"/>
      <stop offset="1" stop-color="#0b1b2a"/>
    </linearGradient>
    <linearGradient id="product" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5de1ff"/>
      <stop offset="1" stop-color="#1677ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="1070" cy="120" r="140" fill="#00b8e6" opacity="0.16"/>
  <circle cx="120" cy="680" r="180" fill="#52c41a" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="150" y="120" width="900" height="560" rx="28" fill="url(#card)" stroke="#2b6f8f" stroke-opacity="0.48"/>
  </g>
  <g transform="translate(230 205)">
    <rect x="0" y="0" width="300" height="390" rx="34" fill="#07131f" stroke="#2b6f8f" stroke-opacity="0.55"/>
    <ellipse cx="150" cy="315" rx="92" ry="22" fill="#000000" opacity="0.28"/>
    <rect x="96" y="102" width="108" height="210" rx="30" fill="url(#product)"/>
    <rect x="112" y="78" width="76" height="54" rx="16" fill="#b7f4ff"/>
    <rect x="118" y="92" width="64" height="18" rx="9" fill="#e6fbff" opacity="0.7"/>
    <rect x="126" y="156" width="48" height="120" rx="24" fill="#ffffff" opacity="0.18"/>
    <path d="M80 330 C110 300, 188 296, 222 330" fill="none" stroke="#5de1ff" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  </g>
  <g transform="translate(590 222)">
    <text x="0" y="0" fill="#e8f4ff" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">VidGo AI</text>
    <text x="0" y="62" fill="#8fd8f0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600">Local share-link test</text>
    <text x="0" y="120" fill="#b8d8e8" font-family="Arial, Helvetica, sans-serif" font-size="22">Use this image to test copy link, native share,</text>
    <text x="0" y="154" fill="#b8d8e8" font-family="Arial, Helvetica, sans-serif" font-size="22">and platform redirect flows without social login.</text>
    <g transform="translate(0 220)">
      <rect x="0" y="0" width="420" height="72" rx="18" fill="#07131f" stroke="#2b6f8f" stroke-opacity="0.5"/>
      <text x="28" y="45" fill="#00b8e6" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">/static_assets/social_share_sample_work.svg</text>
    </g>
  </g>
  <text x="600" y="735" text-anchor="middle" fill="#6b9ab8" font-family="Arial, Helvetica, sans-serif" font-size="18">This file is local test content, not a connected social account.</text>
</svg>